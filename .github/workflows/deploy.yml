name: Deploy Anomaly Grid to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: dashboard
        run: npm run build

      - name: Copy preview assets into export output
        run: |
          cp dashboard/public/dashboard-preview.svg dashboard/out/dashboard-preview.svg
          cp dashboard/public/intel-preview.svg dashboard/out/intel-preview.svg
          cp dashboard/public/stig-preview.svg dashboard/out/stig-preview.svg
          cp dashboard/public/mission-control-preview.svg dashboard/out/mission-control-preview.svg

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
